        <script>
            function validaCampo() {
                if (document.cadastro.email.value == "" || document.cadastro.email.value.length < 3) {
                    alert("Volte para o campo E-mail e preencha este corretamente!");
                    document.cadastro.email.focus();
                    return false;
                }
                if (document.cadastro.senha.value == "" || document.cadastro.senha.value.length < 3) {
                    alert("Volte para o campo Senha e preencha este corretamente!");
                    document.cadastro.senha.focus();
                    return false;
                }
                if (document.cadastro.endereco.value == "" || document.cadastro.endereco.value.length < 3) {
                    alert("Volte para o campo Endereco e preencha este corretamente!");
                    document.cadastro.endereco.focus();
                    return false;
                }
                if (document.cadastro.cpf.value == "" || document.cadastro.cpf.value.length < 3) {
                    alert("Volte para o campo CPF e preencha este corretamente!");
                    document.cadastro.cpf.focus();
                    return false;
                }
                if (document.cadastro.cidade.value == "" || document.cadastro.cidade.value.length < 3) {
                    alert("Volte para o campo Cidade e preencha este corretamente!");
                    document.cadastro.cidade.focus();
                    return false;
                }
                if (document.cadastro.estado.value == "" || document.cadastro.estado.value.length < 3) {
                    alert("Volte para o campo Estado e preencha este corretamente!");
                    document.cadastro.estado.focus();
                    return false;
                }
                if (document.cadastro.cep.value == "" || document.cadastro.cep.value.length < 3) {
                    alert("Volte para o campo CEP e preencha este corretamente!");
                    document.cadastro.cep.focus();
                    return false;
                }
                if (document.cadastro.termos.checked == false) {
                    alert("Seleciona a caixa de Termos e Politicas");
                    return false;
                }
                if (!validaCPF(document.cadastro.cpf.value)) {
                    alert("CPF Inválido");
                    document.cadastro.cpf.focus();
                    return false;
                }
                if (validaCPF) {
                    alert("CPF Válido");
                }

                alert("Cadastro realizado com sucesso!!");
            }

            function validaCPF(cpf) {
                var Soma = 0
                var Resto

                var strCPF = String(cpf).replace(/[^\d]/g, '')

                if (strCPF.length !== 11)
                    return false

                if ([
                    '00000000000',
                    '11111111111',
                    '22222222222',
                    '33333333333',
                    '44444444444',
                    '55555555555',
                    '66666666666',
                    '77777777777',
                    '88888888888',
                    '99999999999',
                ].indexOf(strCPF) !== -1)
                    return false

                for (i = 1; i <= 9; i++)
                    Soma = Soma + parseInt(strCPF.substring(i - 1, i)) * (11 - i);

                Resto = (Soma * 10) % 11

                if ((Resto == 10) || (Resto == 11))
                    Resto = 0

                if (Resto != parseInt(strCPF.substring(9, 10)))
                    return false

                Soma = 0

                for (i = 1; i <= 10; i++)
                    Soma = Soma + parseInt(strCPF.substring(i - 1, i)) * (12 - i)

                Resto = (Soma * 10) % 11

                if ((Resto == 10) || (Resto == 11))
                    Resto = 0

                if (Resto != parseInt(strCPF.substring(10, 11)))
                    return false

                return true
            }

        </script>

                        <div class="col-10">

                        </div>
                        <div class="col-md-5">
                            <label for="cidade" class="form-label">Cidade</label>

                        </div>
                        <div class="col-md-3">

                            </select>
                        </div>
                        <div class="col-md-2">
                            <label for="cep" class="form-label">CEP</label>
                            <input type="text" class="form-control" id="cep" name="cep" required>
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="termos" name="termos">
                                <label class="form-check-label" for="gridCheck">
                                    Li e concordo com todos os Termos e Políticas
                                </label>
                            </div>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn" style="background-color:#8A2BE2; color:white;">
